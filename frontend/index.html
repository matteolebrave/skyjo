<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyjo</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <h1>Skyjo</h1>
    <div id="login">
        <h2>Entrez votre nom</h2>
        <input type="text" id="nameInput" placeholder="Votre nom..." />
        <div id="nbPlayersDiv">
            <label>Nombre de joueurs : </label>
            <input type="number" id="nbPlayers" min="2" max="8" value="2" />
        </div>
        <button onclick="joinGame()">Rejoindre</button>
        <hr style="margin: 1rem 0; border-color: #D3D1C7;">
            <button onclick="resetServer()" style="background:#888; font-size:0.8rem; padding: 8px;">
                Réinitialiser le serveur
            </button>
    </div>
    <div id="game" style="display:none"></div>
    <script src="/frontend/app.js"></script>
</body>
</html>
